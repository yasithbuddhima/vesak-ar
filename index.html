<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>UOR Virtual Vesak</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        .arjs-loader {
            height: 100%; width: 100%; position: absolute; top: 0; left: 0;
            background-color: rgba(0, 0, 0, 0.8); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }
        .arjs-loader div { text-align: center; color: white; font-family: sans-serif; }
    </style>
</head>

<body style="margin: 0px; overflow: hidden;">
    <!-- Loading Screen while AR.js initializes -->
    <div class="arjs-loader">
        <div>Loading UOR Vesak Experience...<br>Please allow camera access.</div>
    </div>

    <a-scene
        embedded
        vr-mode-ui="enabled: false;"
        renderer="logarithmicDepthBuffer: true;"
        arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
        cursor="fuse: false; rayOrigin: mouse"
        raycaster="objects: .clickable">

        <!-- Asset Management -->
        <a-assets>
            <!-- Example: Use your GitHub path here if different -->
            <a-asset-item id="lantern" src="assets/Lantern_01_4k.gltf"></a-asset-item>
        </a-assets>

        <!-- HIRO MARKER -->
        <a-marker preset="hiro" id="marker">
            <!-- The Lantern -->
            <a-entity
                class="clickable"
                id="vesak-model"
                position="0 0.5 0"
                scale="1 1 1"
                /* Swap this line when your GLB is ready: gltf-model="#lantern" */
                gltf-model="#lantern" 
                /* geometry="primitive: cylinder; segmentsRadial: 6; height: 1.2" */
                material="color: #f1c40f; emissive: #f1c40f; emissiveIntensity: 0.5"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
            </a-entity>

            <a-text value="UOR VESAK 2026" position="0 1.2 0" align="center" rotation="-90 0 0" color="#FFFFFF"></a-text>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // Remove loader when the marker is detected or scene loaded
        window.addEventListener('arjs-video-loaded', () => {
            document.querySelector('.arjs-loader').style.display = 'none';
        });

        // Simple interaction: Change color on click
        document.querySelector('#vesak-model').addEventListener('click', function () {
            const colors = ['#f1c40f', '#e67e22', '#e74c3c', '#ffffff'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            this.setAttribute('material', 'color', randomColor);
            this.setAttribute('material', 'emissive', randomColor);
        });
    </script>
</body>
</html>
