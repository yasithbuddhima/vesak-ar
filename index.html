<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>UOR Virtual Vesak - GPS Edition</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- Use the specific Location-Based AR.js build -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
      .arjs-loader {
        height: 100%;
        width: 100%;
        position: absolute;
        top: 0;
        left: 0;
        background-color: rgba(0, 0, 0, 0.8);
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-family: sans-serif;
      }
      #location-info {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(0, 0, 0, 0.7);
        color: #00ff00;
        padding: 10px;
        font-family: monospace;
        z-index: 1000;
        border: 1px solid #00ff00;
        pointer-events: none;
      }
    </style>
  </head>

  <body style="margin: 0px; overflow: hidden">
    <div class="arjs-loader" id="loader">
      <div>Searching for Satellite Signal...</div>
    </div>

    <div id="location-info">
      <div><strong>📍 GPS Status</strong></div>
      <div id="status-text">Waiting for coordinates...</div>
    </div>

    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false;"
    >
      <a-assets>
        <a-asset-item
          id="lantern"
          src="assets/Lantern_01_4k.gltf"
        ></a-asset-item>
      </a-assets>

      <!-- 
        IMPORTANT: gps-entity-place is the correct attribute.
        I used the coordinates you provided for your room.
      -->
      <a-entity
        id="vesak-lantern"
        gltf-model="#lantern"
        gps-entity-place="latitude: 5.946847; longitude: 80.567063;"
        scale="10 10 10"
        position="0 5 0"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear"
      >
        <a-text
          value="UOR VESAK 2026"
          position="0 1.5 0"
          align="center"
          color="yellow"
          scale="2 2 2"
        ></a-text>
      </a-entity>

      <!-- The camera MUST have gps-camera and rotation-reader -->
      <a-entity camera gps-camera rotation-reader></a-entity>
    </a-scene>

    <script>
      window.addEventListener("load", () => {
        const loader = document.getElementById("loader");
        const status = document.getElementById("status-text");

        // Listen for when the GPS system finds the user
        window.addEventListener("gps-camera-update-position", (e) => {
          loader.style.display = "none";
          status.innerHTML = `Lat: ${e.detail.position.latitude.toFixed(6)}<br>Lon: ${e.detail.position.longitude.toFixed(6)}`;
        });

        // Error handling
        window.addEventListener("gps-camera-origin-coord-set", () => {
          console.log("GPS Origin Set!");
        });
      });
    </script>
  </body>
</html>
