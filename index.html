<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>UOR Virtual Vesak - NFT Version</title>
    <!-- Use a single, stable version of the libraries -->
    <script src="https://cdn.jsdelivr.net/gh/aframevr/aframe@1.3.0/dist/aframe-master.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

    <style>
      .arjs-loader {
        height: 100%;
        width: 100%;
        position: absolute;
        top: 0;
        left: 0;
        background-color: rgba(0, 0, 0, 0.8);
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .arjs-loader div {
        text-align: center;
        color: white;
        font-family: sans-serif;
      }
    </style>
  </head>

  <body style="margin: 0px; overflow: hidden">
    <div class="arjs-loader">
      <div>Loading UOR NFT Marker...<br />This may take a moment.</div>
    </div>

    <a-scene
      vr-mode-ui="enabled: false;"
      renderer="logarithmicDepthBuffer: true;"
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false;"
    >
      <a-assets>
        <a-asset-item
          id="lantern"
          src="assets/Lantern_01_4k.gltf"
        ></a-asset-item>
      </a-assets>

      <!-- Location-based AR: Replace latitude and longitude with your target location -->
      <a-location latitude="5.946678" longitude="80.566853">
        <!-- TEST TEXT -->
        <a-text
          value="Vesak AR Active!"
          color="yellow"
          align="center"
          position="0 5 0"
          scale="10 10 10"
        >
        </a-text>
        <!-- The Lantern Model -->
        <a-entity
          gltf-model="#lantern"
          scale="5 5 5"
          position="0 0 0"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear"
        >
        </a-entity>
      </a-location>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      window.addEventListener("arjs-nft-loaded", () => {
        document.querySelector(".arjs-loader").style.display = "none";
        console.log("NFT Marker Data Loaded Successfully");
      });

      window.addEventListener("markerFound", () => {
        console.log("🎯 Marker Found!");
        <!-- alert("Vesak Lantern should be visible now!"); -->
      });
    </script>
  </body>
</html>
